<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서류 제출 — SMART SKY</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 24px 16px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .logo { font-size: 18px; font-weight: 700; color: #1a6dff; }
    h2 { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .desc { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.6; }
    .doc-item { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
    .doc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .doc-name { font-size: 14px; font-weight: 500; color: #1a1a2e; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .badge.pending { background: #fff7e6; color: #d97706; }
    .badge.done { background: #ecfdf5; color: #059669; }
    .badge.approved { background: #eff6ff; color: #1a6dff; }
    .badge.rejected { background: #fef2f2; color: #dc2626; }
    .upload-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; cursor: pointer; font-size: 13px; color: #64748b; transition: all .15s; }
    .upload-btn:hover { border-color: #1a6dff; color: #1a6dff; }
    .upload-btn input { display: none; }
    .file-name { font-size: 12px; color: #888; margin-top: 6px; }
    .submit-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #1a6dff; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .submit-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .msg { font-size: 13px; text-align: center; margin-top: 12px; color: #e53e3e; }
    .msg.success { color: #38a169; }
    .info-box { background: #eff6ff; border-radius: 10px; padding: 14px; margin-bottom: 20px; font-size: 13px; color: #1e40af; line-height: 1.6; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">SMART SKY</div>
</div>

<h2>서류 제출</h2>
<p class="desc">아래 서류를 모두 업로드해주세요.<br>담당자 검토 후 승인되면 일감을 신청할 수 있습니다.</p>

<div class="info-box">
  승인까지 영업일 기준 1~2일 소요됩니다.<br>
  서류 이미지는 JPG, PNG, PDF 형식만 가능합니다.
</div>

<div id="docList"></div>

<button class="submit-btn" id="submitBtn" onclick="submitDocs()">서류 제출하기</button>
<div id="msg" class="msg"></div>

<script type="module">
  import { supabase, DOC_TYPES, session } from './config.js'

  const driver = session.get('driver')
  if (!driver) location.href = './index.html'

  const files = {}

  function renderDocs() {
    const list = document.getElementById('docList')
    list.innerHTML = DOC_TYPES.map((doc, i) => `
      <div class="doc-item">
        <div class="doc-top">
          <span class="doc-name">${doc}</span>
          <span class="badge pending" id="badge-${i}">미제출</span>
        </div>
        <label class="upload-btn">
          <span>파일 선택</span>
          <input type="file" accept=".jpg,.jpeg,.png,.pdf" onchange="selectFile(${i}, this)">
        </label>
        <div class="file-name" id="fname-${i}"></div>
      </div>
    `).join('')
  }

  window.selectFile = (i, input) => {
    if (!input.files[0]) return
    files[i] = input.files[0]
    document.getElementById('fname-' + i).textContent = input.files[0].name
    document.getElementById('badge-' + i).textContent = '선택됨'
    document.getElementById('badge-' + i).className = 'badge done'
  }

  window.submitDocs = async () => {
    const msg = document.getElementById('msg')
    const btn = document.getElementById('submitBtn')
    msg.textContent = ''

    if (Object.keys(files).length < DOC_TYPES.length) {
      msg.textContent = '모든 서류를 업로드해주세요.'
      return
    }

    btn.disabled = true
    btn.textContent = '업로드 중...'

    try {
      for (let i = 0; i < DOC_TYPES.length; i++) {
        const file = files[i]
        const path = `docs/${Date.now()}_${i}`

        const { data: uploadData, error: upErr } = await supabase.storage
          .from('driver-docs')
          .upload(path, file)

        if (upErr) throw upErr

        const { data: urlData } = supabase.storage
          .from('driver-docs')
          .getPublicUrl(path)

        await supabase.from('driver_docs').insert({
          driver_id: driver.id,
          doc_type: DOC_TYPES[i],
          file_url: urlData.publicUrl
        })
      }

      msg.className = 'msg success'
      msg.textContent = '제출 완료! 담당자 승인 후 이용 가능합니다.'
      btn.textContent = '제출 완료'
    } catch (e) {
      msg.textContent = '업로드 중 오류가 발생했습니다. 다시 시도해주세요.'
      btn.disabled = false
      btn.textContent = '서류 제출하기'
    }
  }

  renderDocs()
</script>
</body>
</html>
